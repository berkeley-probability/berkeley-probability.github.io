name: Update arXiv Papers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 1,15 * *"

permissions:
  contents: write

jobs:
  update-arxiv:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install requests pyyaml

      - name: Fetch arXiv papers
        run: python scripts/fetch_arxiv.py

      - name: Commit updated papers
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update arXiv papers"
          file_pattern: contents/recent-papers.qmd contents/all-papers.qmd
